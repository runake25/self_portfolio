<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12121e"/>
      <stop offset="100%" stop-color="#0b0b14"/>
    </linearGradient>
  </defs>
  <!-- Die body -->
  <rect x="2" y="2" width="28" height="28" rx="7" ry="7" fill="url(#bg)"/>
  <rect x="2" y="2" width="28" height="28" rx="7" ry="7" fill="none" stroke="#d97756" stroke-width="1.2" opacity="0.45"/>
  <!-- Dice-5 dot pattern (luck + probability) -->
  <!-- top-left -->
  <circle cx="10" cy="10" r="2.8" fill="#d97756"/>
  <!-- top-right -->
  <circle cx="22" cy="10" r="2.8" fill="#d97756"/>
  <!-- center -->
  <circle cx="16" cy="16" r="2.8" fill="#ef9070"/>
  <!-- bottom-left -->
  <circle cx="10" cy="22" r="2.8" fill="#d97756"/>
  <!-- bottom-right -->
  <circle cx="22" cy="22" r="2.8" fill="#d97756"/>
</svg>
